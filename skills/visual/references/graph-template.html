<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Skill Graph</title>
  <script src="https://unpkg.com/cytoscape@3.30.4/dist/cytoscape.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0d1117;
      color: #e6edf3;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    header {
      padding: 10px 20px;
      background: #161b22;
      border-bottom: 1px solid #30363d;
      display: flex;
      align-items: center;
      gap: 16px;
      flex-shrink: 0;
    }

    header h1 { font-size: 15px; font-weight: 600; color: #c9d1d9; }
    header .subtitle { font-size: 12px; color: #8b949e; }

    .legend {
      display: flex;
      gap: 16px;
      margin-left: auto;
      align-items: center;
      flex-wrap: wrap;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      color: #8b949e;
    }

    .legend-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }

    .legend-line {
      width: 24px;
      height: 2px;
      flex-shrink: 0;
    }

    .legend-line.dashed {
      background: repeating-linear-gradient(
        90deg,
        #d9904a 0, #d9904a 4px,
        transparent 4px, transparent 8px
      );
    }

    main {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    #cy { flex: 1; }

    #panel {
      width: 300px;
      background: #161b22;
      border-left: 1px solid #30363d;
      padding: 16px;
      overflow-y: auto;
      display: none;
      flex-direction: column;
      gap: 10px;
      flex-shrink: 0;
    }

    #panel.visible { display: flex; }

    #panel-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
    }

    #panel h2 { font-size: 15px; font-weight: 600; color: #c9d1d9; line-height: 1.3; }

    #close-panel {
      cursor: pointer;
      color: #8b949e;
      font-size: 18px;
      background: none;
      border: none;
      padding: 0 0 0 8px;
      line-height: 1;
      flex-shrink: 0;
    }

    #close-panel:hover { color: #c9d1d9; }

    .section-label {
      font-size: 10px;
      color: #8b949e;
      text-transform: uppercase;
      letter-spacing: 0.6px;
      font-weight: 600;
    }

    .trigger-badge {
      display: inline-block;
      background: #1f6feb22;
      color: #58a6ff;
      border: 1px solid #1f6feb44;
      border-radius: 4px;
      padding: 2px 8px;
      font-size: 12px;
      font-family: 'SF Mono', 'Fira Code', monospace;
      margin: 2px 2px 2px 0;
    }

    #panel-desc {
      font-size: 13px;
      color: #8b949e;
      line-height: 1.55;
    }

    .io-wrap { display: flex; flex-wrap: wrap; gap: 4px; }

    .io-badge {
      font-size: 11px;
      color: #c9d1d9;
      font-family: 'SF Mono', 'Fira Code', monospace;
      background: #21262d;
      border-radius: 3px;
      padding: 2px 7px;
    }

    .rel-list { display: flex; flex-direction: column; gap: 6px; }

    .rel-item {
      font-size: 12px;
      color: #c9d1d9;
      padding: 6px 8px;
      background: #21262d;
      border-radius: 4px;
      line-height: 1.4;
    }

    .rel-arrow { color: #4a9d6f; font-weight: bold; margin-right: 4px; }
    .rel-arrow.in { color: #d9904a; }

    .rel-type {
      color: #8b949e;
      font-size: 10px;
      display: block;
      margin-top: 2px;
    }

    .rel-label { color: #8b949e; font-style: italic; }

    .inferred-badge {
      display: inline-block;
      font-size: 9px;
      color: #d9904a;
      border: 1px solid #d9904a44;
      border-radius: 2px;
      padding: 0 4px;
      margin-left: 4px;
    }

    #reset-btn {
      position: fixed;
      bottom: 16px;
      left: 16px;
      background: #21262d;
      border: 1px solid #30363d;
      color: #8b949e;
      font-size: 11px;
      padding: 5px 10px;
      border-radius: 4px;
      cursor: pointer;
    }

    #reset-btn:hover { color: #c9d1d9; border-color: #58a6ff; }
  </style>
</head>
<body>

<header>
  <div>
    <h1>🗺️ Skill Graph</h1>
    <div class="subtitle">Click a node to explore · Drag to reposition</div>
  </div>
  <div class="legend">
    <div class="legend-item">
      <div class="legend-dot" style="background:#1f6feb;"></div>
      Skill
    </div>
    <div class="legend-item">
      <div class="legend-dot" style="background:#0d5a2e;border:2px solid #4a9d6f;"></div>
      Terminal
    </div>
    <div class="legend-item">
      <div class="legend-line" style="background:#4a9d6f;"></div>
      leads-to / complements
    </div>
    <div class="legend-item">
      <div class="legend-line dashed"></div>
      alternative / inferred
    </div>
  </div>
</header>

<main>
  <div id="cy"></div>
  <div id="panel">
    <div id="panel-header">
      <h2 id="panel-name"></h2>
      <button id="close-panel">✕</button>
    </div>

    <div id="panel-triggers-section">
      <div class="section-label">Trigger</div>
      <div id="panel-triggers"></div>
    </div>

    <div id="panel-desc-section">
      <div class="section-label">Description</div>
      <div id="panel-desc"></div>
    </div>

    <div id="panel-inputs-section">
      <div class="section-label">Reads</div>
      <div class="io-wrap" id="panel-inputs"></div>
    </div>

    <div id="panel-outputs-section">
      <div class="section-label">Writes</div>
      <div class="io-wrap" id="panel-outputs"></div>
    </div>

    <div id="panel-rels-section">
      <div class="section-label">Relationships</div>
      <div class="rel-list" id="panel-rels"></div>
    </div>
  </div>
</main>

<button id="reset-btn">⟳ Reset layout</button>

<script>
  const graphData = /* GRAPH_DATA_JSON */;

  const elements = [];

  // Build a lookup for edge data (for panel rendering)
  const edgeMap = {};

  graphData.skills.forEach(s => {
    elements.push({
      group: 'nodes',
      data: {
        id: s.id,
        label: s.label || s.id,
        description: s.description || '',
        triggers: s.triggers || [],
        inputs: s.inputs || [],
        outputs: s.outputs || [],
      }
    });
  });

  graphData.edges.forEach((e, i) => {
    const edgeId = `e${i}`;
    elements.push({
      group: 'edges',
      data: {
        id: edgeId,
        source: e.source,
        target: e.target,
        label: e.label || '',
        type: e.type || 'leads-to',
        inferred: !!e.inferred,
      }
    });
  });

  // Identify terminal nodes (no outgoing leads-to edges)
  const hasOutLeadsTo = new Set(
    graphData.edges
      .filter(e => e.type === 'leads-to')
      .map(e => e.source)
  );

  const cy = cytoscape({
    container: document.getElementById('cy'),
    elements,
    style: [
      {
        selector: 'node',
        style: {
          'background-color': '#1a2744',
          'border-color': '#4a90d9',
          'border-width': 2,
          'color': '#c9d1d9',
          'label': 'data(label)',
          'text-valign': 'center',
          'text-halign': 'center',
          'font-size': '11px',
          'width': 130,
          'height': 44,
          'shape': 'roundrectangle',
          'text-wrap': 'wrap',
          'text-max-width': 110,
          'padding': '8px',
          'font-family': '-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif',
        }
      },
      {
        selector: 'node:selected',
        style: {
          'background-color': '#1f3a6e',
          'border-color': '#79c0ff',
          'border-width': 3,
        }
      },
      {
        selector: 'edge',
        style: {
          'width': 2,
          'line-color': '#4a9d6f',
          'target-arrow-color': '#4a9d6f',
          'target-arrow-shape': 'triangle',
          'curve-style': 'bezier',
          'label': 'data(label)',
          'font-size': '9px',
          'color': '#8b949e',
          'text-background-color': '#0d1117',
          'text-background-opacity': 1,
          'text-background-padding': '2px',
          'text-rotation': 'autorotate',
        }
      },
      {
        selector: 'edge[?inferred]',
        style: {
          'line-style': 'dashed',
          'line-color': '#d9904a',
          'target-arrow-color': '#d9904a',
        }
      },
      {
        selector: 'edge[type = "alternative"]',
        style: {
          'line-style': 'dashed',
          'line-color': '#bc8cff',
          'target-arrow-color': '#bc8cff',
        }
      },
      {
        selector: 'edge[type = "complements"]',
        style: {
          'line-color': '#56d364',
          'target-arrow-color': '#56d364',
        }
      },
      {
        selector: 'edge[type = "feeds-from"]',
        style: {
          'line-color': '#e3b341',
          'target-arrow-color': '#e3b341',
        }
      },
    ],
    layout: {
      name: 'breadthfirst',
      directed: true,
      padding: 60,
      spacingFactor: 1.6,
      avoidOverlap: true,
      nodeDimensionsIncludeLabels: true,
    }
  });

  // Mark terminal nodes visually after layout
  cy.nodes().forEach(node => {
    if (!hasOutLeadsTo.has(node.id())) {
      node.style({
        'background-color': '#0d2618',
        'border-color': '#4a9d6f',
        'border-width': 3,
      });
    }
  });

  // Panel interaction
  const panel = document.getElementById('panel');

  cy.on('tap', 'node', function(evt) {
    const node = evt.target;
    const d = node.data();

    document.getElementById('panel-name').textContent = d.label;

    const triggersEl = document.getElementById('panel-triggers');
    triggersEl.innerHTML = d.triggers.map(t =>
      `<span class="trigger-badge">${t}</span>`
    ).join('');
    document.getElementById('panel-triggers-section').style.display =
      d.triggers.length ? '' : 'none';

    document.getElementById('panel-desc').textContent = d.description;
    document.getElementById('panel-desc-section').style.display =
      d.description ? '' : 'none';

    const inputsEl = document.getElementById('panel-inputs');
    inputsEl.innerHTML = d.inputs.map(i =>
      `<span class="io-badge">${i}</span>`
    ).join('');
    document.getElementById('panel-inputs-section').style.display =
      d.inputs.length ? '' : 'none';

    const outputsEl = document.getElementById('panel-outputs');
    outputsEl.innerHTML = d.outputs.map(o =>
      `<span class="io-badge">${o}</span>`
    ).join('');
    document.getElementById('panel-outputs-section').style.display =
      d.outputs.length ? '' : 'none';

    const relEdges = cy.edges(
      `[source = "${d.id}"], [target = "${d.id}"]`
    );
    const relsEl = document.getElementById('panel-rels');
    relsEl.innerHTML = '';

    relEdges.forEach(edge => {
      const ed = edge.data();
      const isOutbound = ed.source === d.id;
      const other = isOutbound ? ed.target : ed.source;
      const arrowClass = isOutbound ? '' : 'in';
      const arrowChar = isOutbound ? '→' : '←';
      const inferredBadge = ed.inferred
        ? '<span class="inferred-badge">inferred</span>'
        : '';

      relsEl.innerHTML += `
        <div class="rel-item">
          <span class="rel-arrow ${arrowClass}">${arrowChar}</span>
          <strong>${other}</strong>${inferredBadge}
          <span class="rel-type">${ed.type}</span>
          <span class="rel-label">${ed.label}</span>
        </div>`;
    });

    document.getElementById('panel-rels-section').style.display =
      relEdges.length ? '' : 'none';

    panel.classList.add('visible');
  });

  document.getElementById('close-panel').addEventListener('click', () => {
    panel.classList.remove('visible');
    cy.elements().unselect();
  });

  cy.on('tap', function(e) {
    if (e.target === cy) {
      panel.classList.remove('visible');
    }
  });

  document.getElementById('reset-btn').addEventListener('click', () => {
    cy.layout({
      name: 'breadthfirst',
      directed: true,
      padding: 60,
      spacingFactor: 1.6,
      avoidOverlap: true,
      nodeDimensionsIncludeLabels: true,
    }).run();
    cy.fit(undefined, 40);
  });
</script>
</body>
</html>
